name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/recipe-frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/recipe-frontend:${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/recipe-frontend:${{ github.sha }}
          format: 'table'
          output: 'trivy-frontend-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-report
          path: trivy-frontend-report.txt
          retention-days: 30

      - name: Update image tag in infra manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/AkhilBhavsar/recipe-infra-ca2.git
          cd recipe-infra-ca2
          sed -i "s|recipeacr9c4b0f.azurecr.io/recipe-frontend:.*|recipeacr9c4b0f.azurecr.io/recipe-frontend:${{ github.sha }}|g" k8s/frontend-blue.yml
          sed -i "s|recipeacr9c4b0f.azurecr.io/recipe-frontend:.*|recipeacr9c4b0f.azurecr.io/recipe-frontend:${{ github.sha }}|g" k8s/frontend-green.yml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions CI"
          git add k8s/frontend-blue.yml k8s/frontend-green.yml
          git diff --cached --quiet || git commit -m "ci: update frontend image to ${{ github.sha }}"
          git push